version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: support_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: support_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: support_migrate
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
    depends_on:
      - postgres

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: support_port_forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    profiles:
      - tools

volumes:
  pgdata: